<!DOCTYPE html>

<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AK.DEV Plate Pro</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

</head>

<body>

    <div class="bg-glow"></div>

    <div class="bg-circles">

        <div class="circle c1"></div>

        <div class="circle c2"></div>

    </div>



    <div class="app-container">

        <<div class="glass-card">
    <h1 class="title">PLATE<span>GENERATOR</span></h1>
    
    <div class="controls-row">
        <div class="control-group">
            <label>РЕГИОН</label>
            <select id="regionSelect">
                <option value="763">763 — Самарская обл.</option>
                <option value="89">89 — Муравленко (ЯНАО)</option>
                <option value="55">55 — Омская обл.</option>
                <option value="97">97 — Москва</option>
                <option value="custom">Свой вариант...</option>
            </select>
            <input type="number" id="customRegion" placeholder="№" style="display:none; width: 60px; margin-top: 10px;">
        </div>

        <div class="control-group">
            <label>СКОРОСТЬ</label>
            <select id="speedSelect">
                <option value="normal">Обычная</option>
                <option value="instant">Моментально</option>
            </select>
        </div>
    </div>

    <div class="plate-frame">
        <div class="plate-body">
            <div class="plate-inner">
                <div class="symbols-track">
                    <div class="slot" data-type="char"></div>
                    <div class="slot" data-type="num"></div>
                    <div class="slot" data-type="num"></div>
                    <div class="slot" data-type="num"></div>
                    <div class="slot" data-type="char"></div>
                    <div class="slot" data-type="char"></div>
                </div>
                <div class="region-separator"></div>
                <div class="region-info">
                    <div class="reg-code" id="regDisplay">763</div>
                    <div class="rus-box">
                        <span>RUS</span>
                        <div class="flag"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button id="spinBtn">СГЕНЕРИРОВАТЬ</button>
</div>

    </div>



    <script src="script.js"></script>

</body>

</html>
